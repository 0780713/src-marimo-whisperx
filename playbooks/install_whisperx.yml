---
- name: Installeer Marimo op SURF Research Cloud
  hosts: localhost
  gather_facts: true
  become: true

  vars:
    install_user: ubuntu
    workdir: /home/ubuntu/whisperx

  tasks:

    - name: Installeer systeempakketten
      apt:
        update_cache: yes
        name:
          - python3-pip
          - python3-venv
        state: present

    - name: Maak virtuele omgeving aan
      become_user: "{{ install_user }}"
      command: python3 -m venv /home/{{ install_user }}/venv
      args:
        creates: /home/{{ install_user }}/venv

    - name: Upgrade pip in venv
      become_user: "{{ install_user }}"
      pip:
        name: pip
        state: latest
        virtualenv: /home/{{ install_user }}/venv

    - name: Installeer Marimo
      become_user: "{{ install_user }}"
      pip:
        name: marimo
        virtualenv: /home/{{ install_user }}/venv

    - name: Maak werkmap aan
      file:
        path: "{{ workdir }}"
        state: directory
        owner: "{{ install_user }}"
        mode: "0755"

    - name: Plaats test notebook
      become_user: "{{ install_user }}"
      copy:
        dest: "{{ workdir }}/transcribe.py"
        content: |
          import marimo as mo

          greeting = mo.md("# 👋 Marimo werkt!")

    - name: Maak systemd service aan voor Marimo
      copy:
        dest: /etc/systemd/system/marimo.service
        content: |
          [Unit]
          Description=Marimo Notebook Server
          After=network.target

          [Service]
          Type=simple
          User={{ install_user }}
          WorkingDirectory={{ workdir }}
          Environment="PATH=/home/{{ install_user }}/venv/bin"
          ExecStart=/home/{{ install_user }}/venv/bin/marimo edit transcribe.py --host 0.0.0.0 --port 80 --no-token
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Start en activeer Marimo service
      systemd:
        name: marimo
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Installatie voltooid
      debug:
        msg: "Marimo is bereikbaar op poort 2718."