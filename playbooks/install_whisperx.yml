---
- name: Install Marimo + WhisperX on SURF Research Cloud
  hosts: localhost
  gather_facts: true
  become: true

  vars:
    install_user: ubuntu
    venv_path: /home/ubuntu/venv
    marimo_port: 2718

    # SURF parameters (must exist in the catalog item)
    # whisperx_hf_token
    # rclone_webdav_pass

    rclone_remote_name: RD
    rclone_webdav_url: https://hr.data.surf.nl/remote.php/dav/files/NieSA@hro.nl
    rclone_user: NieSA@hro.nl
    rclone_remote_path: "RD:Didactiek van hoge verwachtingen/RD"
    rclone_mountpoint: /home/ubuntu/research-drive

    # Work directly inside the mounted Research Drive
    workdir: "{{ rclone_mountpoint }}"

  tasks:

  # ---------------------------------------------------------------------------
  # SYSTEM DEPENDENCIES
  # ---------------------------------------------------------------------------

  - name: Install system packages
    apt:
      update_cache: yes
      cache_valid_time: 3600
      name:
        - python3-pip
        - python3-venv
        - ffmpeg
        - libsndfile1
        - git
        - fuse3
        - rclone
      state: present

  # ---------------------------------------------------------------------------
  # INSTALL UV
  # ---------------------------------------------------------------------------

  - name: Install uv package manager
    become_user: "{{ install_user }}"
    shell: curl -LsSf https://astral.sh/uv/install.sh | sh
    args:
      creates: /home/{{ install_user }}/.local/bin/uv

  - name: Ensure uv in PATH
    become_user: "{{ install_user }}"
    lineinfile:
      path: /home/{{ install_user }}/.bashrc
      line: 'export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"'
      create: yes

  # ---------------------------------------------------------------------------
  # PYTHON ENVIRONMENT
  # ---------------------------------------------------------------------------

  - name: Create virtual environment
    become_user: "{{ install_user }}"
    command: /home/{{ install_user }}/.local/bin/uv venv {{ venv_path }}
    args:
      creates: "{{ venv_path }}"

  - name: Detect GPU
    command: nvidia-smi
    register: gpu_check
    ignore_errors: yes
    changed_when: false

  - name: Install PyTorch CUDA
    become_user: "{{ install_user }}"
    command: >
      /home/{{ install_user }}/.local/bin/uv pip install
      torch torchaudio
      --index-url https://download.pytorch.org/whl/cu121
      --python {{ venv_path }}/bin/python
    when: gpu_check.rc == 0

  - name: Install PyTorch CPU
    become_user: "{{ install_user }}"
    command: >
      /home/{{ install_user }}/.local/bin/uv pip install
      torch torchaudio
      --index-url https://download.pytorch.org/whl/cpu
      --python {{ venv_path }}/bin/python
    when: gpu_check.rc != 0

  - name: Install Python packages
    become_user: "{{ install_user }}"
    command: >
      /home/{{ install_user }}/.local/bin/uv pip install
      marimo whisperx faster-whisper ctranslate2
      pandas openpyxl numpy tqdm
      --python {{ venv_path }}/bin/python

  # ---------------------------------------------------------------------------
  # HUGGINGFACE TOKEN
  # ---------------------------------------------------------------------------

  - name: Write HuggingFace token to environment file
    copy:
      dest: /etc/whisperx.env
      mode: "0600"
      content: |
        HUGGINGFACE_TOKEN={{ whisperx_hf_token }}
    no_log: true

  # ---------------------------------------------------------------------------
  # RCLONE CONFIG
  # ---------------------------------------------------------------------------

  - name: Enable allow_other for FUSE
    lineinfile:
      path: /etc/fuse.conf
      line: user_allow_other
      create: yes

  - name: Create rclone config directory
    become_user: "{{ install_user }}"
    file:
      path: /home/{{ install_user }}/.config/rclone
      state: directory
      mode: "0700"

  - name: Obscure rclone password
    become_user: "{{ install_user }}"
    command: rclone obscure "{{ rclone_webdav_pass }}"
    register: rclone_pass_obscured
    changed_when: false
    no_log: true

  - name: Write rclone config
    become_user: "{{ install_user }}"
    copy:
      dest: /home/{{ install_user }}/.config/rclone/rclone.conf
      mode: "0600"
      content: |
        [{{ rclone_remote_name }}]
        type = webdav
        url = {{ rclone_webdav_url }}
        vendor = nextcloud
        user = {{ rclone_user }}
        pass = {{ rclone_pass_obscured.stdout }}

  - name: Create mount directory
    file:
      path: "{{ rclone_mountpoint }}"
      state: directory
      owner: "{{ install_user }}"
      mode: "0755"

  - name: Create rclone mount systemd service
    copy:
      dest: /etc/systemd/system/rclone-mount.service
      content: |
        [Unit]
        Description=Rclone Mount Research Drive
        After=network-online.target
        Wants=network-online.target

        [Service]
        Type=simple
        User={{ install_user }}
        ExecStart=/usr/bin/rclone mount \
          {{ rclone_remote_path }} {{ rclone_mountpoint }} \
          --allow-other \
          --dir-cache-time 12h \
          --vfs-cache-mode full \
          --vfs-cache-max-size 10G
        ExecStop=/bin/fusermount -u {{ rclone_mountpoint }}
        Restart=on-failure
        RestartSec=5

        [Install]
        WantedBy=multi-user.target

  - name: Start rclone mount
    systemd:
      name: rclone-mount
      enabled: yes
      state: started
      daemon_reload: yes

  - name: Wait for rclone mount
    command: mountpoint -q {{ rclone_mountpoint }}
    register: mount_check
    retries: 10
    delay: 3
    until: mount_check.rc == 0

  # ---------------------------------------------------------------------------
  # NGINX REVERSE PROXY
  # ---------------------------------------------------------------------------

  - name: Ensure nginx app location directory
    file:
      path: /etc/nginx/app-location-conf.d
      state: directory
      mode: "0755"

  - name: Configure nginx reverse proxy for Marimo
    copy:
      dest: /etc/nginx/app-location-conf.d/marimo.conf
      content: |
        location / {
            proxy_pass http://127.0.0.1:{{ marimo_port }};
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_buffering off;
        }
    notify: restart nginx

  # ---------------------------------------------------------------------------
  # MARIMO SERVICE
  # ---------------------------------------------------------------------------

  - name: Create Marimo systemd service
    copy:
      dest: /etc/systemd/system/marimo.service
      content: |
        [Unit]
        Description=Marimo Notebook Server
        After=network.target

        [Service]
        Type=simple
        User={{ install_user }}
        WorkingDirectory={{ workdir }}
        EnvironmentFile=/etc/whisperx.env
        Environment="PATH={{ venv_path }}/bin:/usr/local/bin:/usr/bin:/bin"
        ExecStart={{ venv_path }}/bin/marimo edit --host 127.0.0.1 --port {{ marimo_port }} --no-token
        Restart=on-failure
        RestartSec=5

        [Install]
        WantedBy=multi-user.target

  - name: Start Marimo
    systemd:
      name: marimo
      enabled: yes
      state: started
      daemon_reload: yes

  # ---------------------------------------------------------------------------
  # VERIFICATION
  # ---------------------------------------------------------------------------

  - name: Wait for Marimo port
    wait_for:
      port: "{{ marimo_port }}"
      delay: 3
      timeout: 30

  - name: Verify WhisperX installation
    become_user: "{{ install_user }}"
    command: "{{ venv_path }}/bin/python -c 'import whisperx; print(\"WhisperX OK\")'"
    register: whisperx_check
    changed_when: false
    ignore_errors: yes

  - name: Installation summary
    debug:
      msg: |
        === INSTALLATION COMPLETE ===
        Marimo running on port {{ marimo_port }}
        WhisperX status: {{ whisperx_check.stdout | default('check failed') }}
        Workdir (Research Drive): {{ workdir }}
        GPU detected: {{ 'YES' if gpu_check.rc == 0 else 'NO (CPU mode)' }}

  handlers:

  - name: restart nginx
    systemd:
      name: nginx
      state: restarted
