---
- name: Installeer Marimo + WhisperX op SURF Research Cloud
  hosts: localhost
  gather_facts: true
  become: true

  vars:
    install_user: ubuntu
    workdir: /home/ubuntu/whisperx
    venv_path: /home/ubuntu/venv
    marimo_port: 2718
    whisperx_hf_token: "{{ ansible_env.whisperx_hf_token }}"  # ResearchCloud parameter key
    rclone_remote_name: RD
    rclone_webdav_url: https://hr.data.surf.nl/remote.php/dav/files/NieSA@hro.nl
    rclone_user: NieSA@hro.nl
    rclone_pass: "{{ ansible_env.rclone_webdav_pass }}"   # ResearchCloud parameter key
    rclone_remote_path: "RD:Didactiek van hoge verwachtingen/RD"
    rclone_mountpoint: /home/ubuntu/research-drive

  tasks:

    # =========================================================================
    # 1. SYSTEEM DEPENDENCIES
    # =========================================================================

    - name: Installeer systeempakketten
      apt:
        update_cache: yes
        name:
          - python3-pip
          - python3-venv
          - ffmpeg
          - libsndfile1
          - git
          - fuse3
        state: present

    # =========================================================================
    # 2. PYTHON VIRTUAL ENVIRONMENT
    # =========================================================================

    - name: Maak virtuele omgeving aan
      become_user: "{{ install_user }}"
      command: python3 -m venv {{ venv_path }}
      args:
        creates: "{{ venv_path }}"

    - name: Upgrade pip in venv
      become_user: "{{ install_user }}"
      pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_path }}"

    # =========================================================================
    # 3. INSTALLEER MARIMO
    # =========================================================================

    - name: Installeer Marimo
      become_user: "{{ install_user }}"
      pip:
        name: marimo
        virtualenv: "{{ venv_path }}"

    # =========================================================================
    # 4. INSTALLEER WHISPERX + DEPENDENCIES
    # =========================================================================
    # WhisperX heeft PyTorch met CUDA nodig. Op een workspace ZONDER
    # CUDA-component installeren we CPU-versie. Met CUDA-component
    # detecteert torch automatisch de GPU.

    - name: Controleer of CUDA beschikbaar is
      stat:
        path: /usr/local/cuda
      register: cuda_check

    - name: Installeer PyTorch (CUDA) als CUDA aanwezig
      become_user: "{{ install_user }}"
      pip:
        name:
          - torch
          - torchaudio
        virtualenv: "{{ venv_path }}"
        extra_args: "--index-url https://download.pytorch.org/whl/cu121"
      when: cuda_check.stat.exists

    - name: Installeer PyTorch (CPU) als geen CUDA
      become_user: "{{ install_user }}"
      pip:
        name:
          - torch
          - torchaudio
        virtualenv: "{{ venv_path }}"
        extra_args: "--index-url https://download.pytorch.org/whl/cpu"
      when: not cuda_check.stat.exists

    - name: Installeer WhisperX
      become_user: "{{ install_user }}"
      pip:
        name: whisperx
        virtualenv: "{{ venv_path }}"

    - name: Installeer extra Python packages
      become_user: "{{ install_user }}"
      pip:
        name:
          - pandas
          - openpyxl
        virtualenv: "{{ venv_path }}"

    # =========================================================================
    # 5. WERKMAP
    # =========================================================================

    - name: Maak werkmap aan
      file:
        path: "{{ workdir }}"
        state: directory
        owner: "{{ install_user }}"
        mode: "0755"

    # =========================================================================
    # 6. RCLONE — RESEARCH DRIVE KOPPELEN
    # =========================================================================

    - name: Zorg dat user_allow_other in fuse.conf staat
      lineinfile:
        path: /etc/fuse.conf
        line: user_allow_other
        create: yes

    - name: Installeer rclone
      apt:
        name: rclone
        state: present

    - name: Maak rclone config directory aan
      become_user: "{{ install_user }}"
      file:
        path: /home/{{ install_user }}/.config/rclone
        state: directory
        mode: "0700"

    - name: Obfusceer rclone wachtwoord
      become_user: "{{ install_user }}"
      command: rclone obscure "{{ rclone_pass }}"
      register: rclone_pass_obscured
      changed_when: false
      no_log: true

    - name: Schrijf rclone.conf
      become_user: "{{ install_user }}"
      copy:
        dest: /home/{{ install_user }}/.config/rclone/rclone.conf
        mode: "0600"
        content: |
          [{{ rclone_remote_name }}]
          type = webdav
          url = {{ rclone_webdav_url }}
          vendor = nextcloud
          user = {{ rclone_user }}
          pass = {{ rclone_pass_obscured.stdout }}

    - name: Maak mountpoint aan
      file:
        path: "{{ rclone_mountpoint }}"
        state: directory
        owner: "{{ install_user }}"
        mode: "0755"

    - name: Maak systemd service aan voor rclone mount
      copy:
        dest: /etc/systemd/system/rclone-mount.service
        content: |
          [Unit]
          Description=rclone mount Research Drive
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=notify
          User={{ install_user }}
          ExecStart=/usr/bin/rclone mount \
              {{ rclone_remote_path }} {{ rclone_mountpoint }} \
              --vfs-cache-mode writes \
              --allow-other
          ExecStop=/bin/fusermount -u {{ rclone_mountpoint }}
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Start en activeer rclone mount service
      systemd:
        name: rclone-mount
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wacht tot mountpoint beschikbaar is
      wait_for:
        path: "{{ rclone_mountpoint }}"
        timeout: 15

    # =========================================================================
    # 7. NGINX REVERSE PROXY CONFIGURATIE  
    # =========================================================================
    # SRC-Nginx draait al op poort 80/443. We configureren nginx om
    # verkeer door te sturen naar Marimo op de interne poort.

    - name: Controleer of nginx app-location-conf.d directory bestaat
      file:
        path: /etc/nginx/app-location-conf.d
        state: directory
        mode: "0755"

    - name: Maak nginx configuratie aan voor Marimo
      copy:
        dest: /etc/nginx/app-location-conf.d/marimo.conf
        content: |
          location / {
              proxy_pass http://127.0.0.1:{{ marimo_port }};
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_read_timeout 86400;
              proxy_buffering off;
          }
      notify: Herstart nginx

    # =========================================================================
    # 8. SYSTEMD SERVICE VOOR MARIMO
    # =========================================================================

    - name: Maak systemd service aan voor Marimo
      copy:
        dest: /etc/systemd/system/marimo.service
        content: |
          [Unit]
          Description=Marimo Notebook Server
          After=network.target

          [Service]
          Type=simple
          User={{ install_user }}
          WorkingDirectory={{ workdir }}
          Environment="PATH={{ venv_path }}/bin:/usr/local/bin:/usr/bin:/bin"
          Environment="HF_TOKEN={{ whisperx_hf_token }}"
          ExecStart={{ venv_path }}/bin/marimo edit --host 0.0.0.0 --port {{ marimo_port }} --no-token
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Start en activeer Marimo service
      systemd:
        name: marimo
        enabled: yes
        state: started
        daemon_reload: yes

    # =========================================================================
    # 9. VERIFICATIE
    # =========================================================================

    - name: Wacht tot Marimo is opgestart
      wait_for:
        port: "{{ marimo_port }}"
        delay: 3
        timeout: 30

    - name: Verifieer WhisperX installatie
      become_user: "{{ install_user }}"
      command: "{{ venv_path }}/bin/python -c 'import whisperx; print(\"WhisperX OK\")'"
      register: whisperx_check
      changed_when: false
      ignore_errors: yes

    - name: Installatie voltooid
      debug:
        msg: |
          === INSTALLATIE VOLTOOID ===
          Marimo draait op interne poort {{ marimo_port }}
          Bereikbaar via: https://{{ ansible_fqdn | default('WORKSPACE_URL') }}
          WhisperX: {{ whisperx_check.stdout | default('check failed') }}
          Werkmap: {{ workdir }}
          CUDA: {{ 'JA' if cuda_check.stat.exists else 'NEE - voeg CUDA component toe!' }}

  # =========================================================================
  # HANDLERS
  # =========================================================================

  handlers:
    - name: Herstart nginx
      systemd:
        name: nginx
        state: reloaded
