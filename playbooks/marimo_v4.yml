---
- name: Installeer Marimo v4
  hosts: localhost
  gather_facts: true
  become: true

  vars:
    install_user: ubuntu
    workdir: /home/ubuntu/researchdrive
    venv_path: /home/ubuntu/venv
    marimo_port: 2718

  tasks:

    # =========================================================================
    # 1. SYSTEEM DEPENDENCIES
    # =========================================================================

    - name: Installeer ffmpeg
      apt:
        update_cache: yes
        name:
          - ffmpeg
        state: present

    # =========================================================================
    # 2. PYTHON VIRTUAL ENVIRONMENT EN MARIMO VIA UV
    # =========================================================================

    - name: Maak virtuele omgeving aan met uv
      become_user: "{{ install_user }}"
      command: uv venv {{ venv_path }}
      args:
        creates: "{{ venv_path }}"

    - name: Installeer Marimo met uv
      become_user: "{{ install_user }}"
      command: uv pip install marimo
      environment:
        VIRTUAL_ENV: "{{ venv_path }}"

    # =========================================================================
    # 3. MARIMO CONFIGURATIE (uv als package manager)
    # =========================================================================

    - name: Maak marimo config directory aan
      become_user: "{{ install_user }}"
      file:
        path: /home/{{ install_user }}/.config/marimo
        state: directory
        mode: "0755"

    - name: Configureer marimo om uv te gebruiken
      become_user: "{{ install_user }}"
      copy:
        dest: /home/{{ install_user }}/.config/marimo/marimo.toml
        content: |
          [package_management]
          manager = "uv"

    # =========================================================================
    # 5. RESEARCHDRIVE KOPPELEN AAN UBUNTU
    # =========================================================================

    - name: Zoek portaalgebruiker (niet ubuntu) in /home
      shell: ls /home | grep -v ubuntu | head -1
      register: portal_user
      changed_when: false

    - name: Geef ubuntu toegang tot portaalgebruiker home
      file:
        path: "/home/{{ portal_user.stdout }}"
        mode: "0755"
      when: portal_user.stdout != ""

    - name: Verwijder lokale werkmap als die bestaat
      file:
        path: "{{ workdir }}"
        state: absent
      when: portal_user.stdout != ""

    - name: Maak symlink naar researchdrive van portaalgebruiker
      file:
        src: "/home/{{ portal_user.stdout }}/researchdrive"
        dest: "{{ workdir }}"
        state: link
        owner: "{{ install_user }}"
      when: portal_user.stdout != ""

    - name: Maak lokale werkmap als fallback (geen portaalgebruiker gevonden)
      file:
        path: "{{ workdir }}"
        state: directory
        owner: "{{ install_user }}"
        mode: "0755"
      when: portal_user.stdout == ""

    # =========================================================================
    # 6. NGINX REVERSE PROXY CONFIGURATIE
    # =========================================================================

    - name: Maak nginx app-location-conf.d directory aan
      file:
        path: /etc/nginx/app-location-conf.d
        state: directory
        mode: "0755"

    - name: Maak nginx configuratie aan voor Marimo
      copy:
        dest: /etc/nginx/app-location-conf.d/marimo.conf
        content: |
          location / {
              proxy_pass http://127.0.0.1:{{ marimo_port }};
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_read_timeout 86400;
              proxy_buffering off;
          }
      notify: Herstart nginx

    # =========================================================================
    # 7. SYSTEMD SERVICE VOOR MARIMO
    # =========================================================================

    - name: Maak systemd service aan voor Marimo
      copy:
        dest: /etc/systemd/system/marimo.service
        content: |
          [Unit]
          Description=Marimo Notebook Server
          After=network.target

          [Service]
          Type=simple
          User={{ install_user }}
          WorkingDirectory={{ workdir }}
          Environment="PATH={{ venv_path }}/bin:/usr/local/bin:/usr/bin:/bin"
          Environment="VIRTUAL_ENV={{ venv_path }}"
          ExecStart={{ venv_path }}/bin/marimo edit --host 0.0.0.0 --port {{ marimo_port }} --no-token
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Start en activeer Marimo service
      systemd:
        name: marimo
        enabled: yes
        state: started
        daemon_reload: yes

    # =========================================================================
    # 8. VERIFICATIE
    # =========================================================================

    - name: Wacht tot Marimo is opgestart
      wait_for:
        port: "{{ marimo_port }}"
        delay: 3
        timeout: 30

    - name: Installatie voltooid
      debug:
        msg: |
          === INSTALLATIE VOLTOOID ===
          Marimo draait op poort {{ marimo_port }}
          Bereikbaar via: https://{{ ansible_fqdn | default('WORKSPACE_URL') }}
          Werkmap: {{ workdir }}
          Package manager: uv (packages installeren via Marimo UI)

  # =========================================================================
  # HANDLERS
  # =========================================================================

  handlers:
    - name: Herstart nginx
      systemd:
        name: nginx
        state: reloaded
