---
- name: Installeer Marimo + WhisperX op SURF Research Cloud
  hosts: localhost
  gather_facts: true
  become: true

  vars:
    install_user: ubuntu
    workdir: /home/ubuntu/researchdrive
    venv_path: /home/ubuntu/venv
    marimo_port: 2718

  tasks:

    # =========================================================================
    # 1. SYSTEEM DEPENDENCIES
    # =========================================================================

    - name: Installeer systeempakketten
      apt:
        update_cache: yes
        name:
          - python3-pip
          - python3-venv
          - ffmpeg
          - libsndfile1
          - git
        state: present

    # =========================================================================
    # 2. PYTHON VIRTUAL ENVIRONMENT
    # =========================================================================

    - name: Maak virtuele omgeving aan
      become_user: "{{ install_user }}"
      command: python3 -m venv {{ venv_path }}
      args:
        creates: "{{ venv_path }}"

    - name: Upgrade pip in venv
      become_user: "{{ install_user }}"
      pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_path }}"

    # =========================================================================
    # 3. INSTALLEER MARIMO
    # =========================================================================

    - name: Installeer Marimo
      become_user: "{{ install_user }}"
      pip:
        name: marimo
        virtualenv: "{{ venv_path }}"

    # =========================================================================
    # 4. INSTALLEER WHISPERX + DEPENDENCIES
    # =========================================================================
    # WhisperX heeft PyTorch met CUDA nodig. Op een workspace ZONDER
    # CUDA-component installeren we CPU-versie. Met CUDA-component
    # detecteert torch automatisch de GPU.

    - name: Controleer of CUDA beschikbaar is
      stat:
        path: /usr/local/cuda
      register: cuda_check

    - name: Installeer PyTorch (CUDA) als CUDA aanwezig
      become_user: "{{ install_user }}"
      pip:
        name:
          - torch
          - torchaudio
        virtualenv: "{{ venv_path }}"
        extra_args: "--index-url https://download.pytorch.org/whl/cu121"
      when: cuda_check.stat.exists

    - name: Installeer PyTorch (CPU) als geen CUDA
      become_user: "{{ install_user }}"
      pip:
        name:
          - torch
          - torchaudio
        virtualenv: "{{ venv_path }}"
        extra_args: "--index-url https://download.pytorch.org/whl/cpu"
      when: not cuda_check.stat.exists

    - name: Installeer WhisperX
      become_user: "{{ install_user }}"
      pip:
        name: whisperx
        virtualenv: "{{ venv_path }}"

    - name: Installeer extra Python packages
      become_user: "{{ install_user }}"
      pip:
        name:
          - pandas
          - openpyxl
          - numpy
        virtualenv: "{{ venv_path }}"

    # =========================================================================
    # 5. RESEARCHDRIVE KOPPELEN AAN UBUNTU
    # =========================================================================
    # ResearchDrive wordt door SRC gemount onder de home van de portaalgebruiker
    # (bijv. /home/svannieuwe/researchdrive). We maken die toegankelijk voor
    # ubuntu via een symlink.

    - name: Zoek portaalgebruiker (niet ubuntu) in /home
      shell: ls /home | grep -v ubuntu | head -1
      register: portal_user
      changed_when: false

    - name: Geef ubuntu toegang tot portaalgebruiker home
      file:
        path: "/home/{{ portal_user.stdout }}"
        mode: "0755"
      when: portal_user.stdout != ""

    - name: Verwijder lokale werkmap als die bestaat
      file:
        path: "{{ workdir }}"
        state: absent
      when: portal_user.stdout != ""

    - name: Maak symlink naar researchdrive van portaalgebruiker
      file:
        src: "/home/{{ portal_user.stdout }}/researchdrive"
        dest: "{{ workdir }}"
        state: link
        owner: "{{ install_user }}"
      when: portal_user.stdout != ""

    - name: Maak lokale werkmap als fallback (geen portaalgebruiker gevonden)
      file:
        path: "{{ workdir }}"
        state: directory
        owner: "{{ install_user }}"
        mode: "0755"
      when: portal_user.stdout == ""

    # =========================================================================
    # 6. NGINX REVERSE PROXY CONFIGURATIE
    # =========================================================================

    - name: Controleer of nginx app-location-conf.d directory bestaat
      file:
        path: /etc/nginx/app-location-conf.d
        state: directory
        mode: "0755"

    - name: Maak nginx configuratie aan voor Marimo
      copy:
        dest: /etc/nginx/app-location-conf.d/marimo.conf
        content: |
          location / {
              proxy_pass http://127.0.0.1:{{ marimo_port }};
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_read_timeout 86400;
              proxy_buffering off;
          }
      notify: Herstart nginx

    # =========================================================================
    # 7. SYSTEMD SERVICE VOOR MARIMO
    # =========================================================================

    - name: Maak systemd service aan voor Marimo
      copy:
        dest: /etc/systemd/system/marimo.service
        content: |
          [Unit]
          Description=Marimo Notebook Server
          After=network.target

          [Service]
          Type=simple
          User={{ install_user }}
          WorkingDirectory={{ workdir }}
          Environment="PATH={{ venv_path }}/bin:/usr/local/bin:/usr/bin:/bin"
          ExecStart={{ venv_path }}/bin/marimo edit --host 0.0.0.0 --port {{ marimo_port }} --no-token
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Start en activeer Marimo service
      systemd:
        name: marimo
        enabled: yes
        state: started
        daemon_reload: yes

    # =========================================================================
    # 8. VERIFICATIE
    # =========================================================================

    - name: Wacht tot Marimo is opgestart
      wait_for:
        port: "{{ marimo_port }}"
        delay: 3
        timeout: 30

    - name: Verifieer WhisperX installatie
      become_user: "{{ install_user }}"
      command: "{{ venv_path }}/bin/python -c 'import whisperx; print(\"WhisperX OK\")'"
      register: whisperx_check
      changed_when: false
      ignore_errors: yes

    - name: Installatie voltooid
      debug:
        msg: |
          === INSTALLATIE VOLTOOID ===
          Marimo draait op interne poort {{ marimo_port }}
          Bereikbaar via: https://{{ ansible_fqdn | default('WORKSPACE_URL') }}
          WhisperX: {{ whisperx_check.stdout | default('check failed') }}
          Werkmap: {{ workdir }}
          ResearchDrive portaalgebruiker: {{ portal_user.stdout | default('niet gevonden') }}
          CUDA: {{ 'JA' if cuda_check.stat.exists else 'NEE - voeg CUDA component toe!' }}

  # =========================================================================
  # HANDLERS
  # =========================================================================

  handlers:
    - name: Herstart nginx
      systemd:
        name: nginx
        state: reloaded
