---
- name: Installeer WhisperX + Marimo op SURF Research Cloud
  hosts: localhost
  gather_facts: true
  become: true

  vars:
    hf_token: "{{ whisperx_hf_token }}"
    install_user: ubuntu
    workdir: /home/ubuntu/whisperx

  tasks:

    # --- Systeem ---
    - name: Systeem updaten
      apt:
        update_cache: yes
        upgrade: yes

    - name: Installeer systeempakketten
      apt:
        name:
          - ffmpeg
          - python3-pip
          - python3-venv
        state: present

    # --- Python omgeving ---
    - name: Maak virtuele omgeving aan
      become_user: "{{ install_user }}"
      command: python3 -m venv /home/{{ install_user }}/venv
      args:
        creates: /home/{{ install_user }}/venv

    - name: Upgrade pip in venv
      become_user: "{{ install_user }}"
      pip:
        name: pip
        state: latest
        virtualenv: /home/{{ install_user }}/venv

    # --- PyTorch met CUDA ---
    - name: Installeer PyTorch met CUDA 11.8
      become_user: "{{ install_user }}"
      pip:
        name:
          - torch
          - torchvision
          - torchaudio
        extra_args: "--index-url https://download.pytorch.org/whl/cu118"
        virtualenv: /home/{{ install_user }}/venv

    # --- WhisperX en Marimo ---
    - name: Installeer WhisperX
      become_user: "{{ install_user }}"
      pip:
        name: whisperx
        virtualenv: /home/{{ install_user }}/venv

    - name: Installeer Marimo
      become_user: "{{ install_user }}"
      pip:
        name: marimo
        virtualenv: /home/{{ install_user }}/venv

    # --- HuggingFace token ---
    - name: Sla HuggingFace token op in .bashrc
      become_user: "{{ install_user }}"
      lineinfile:
        path: /home/{{ install_user }}/.bashrc
        line: 'export HF_TOKEN="{{ hf_token }}"'
        regexp: '^export HF_TOKEN='
        create: yes

    - name: Sla HuggingFace token op in /etc/environment
      lineinfile:
        path: /etc/environment
        line: 'HF_TOKEN="{{ hf_token }}"'
        regexp: '^HF_TOKEN='
        create: yes

    # --- Werkmap en notebook ---
    - name: Maak werkmap aan
      file:
        path: "{{ workdir }}"
        state: directory
        owner: "{{ install_user }}"
        mode: "0755"

    - name: Plaats transcriptie notebook
      become_user: "{{ install_user }}"
      copy:
        dest: "{{ workdir }}/transcribe.py"
        content: |
          import marimo as mo
          import whisperx
          import gc
          import json
          import os

          # Configuratie
          device = "cuda"
          compute_type = "float16"  # gebruik "int8" als GPU-geheugen krap is
          HF_TOKEN = os.environ.get("HF_TOKEN", "")

          # UI
          video_path = mo.ui.text(
              placeholder="/home/ubuntu/whisperx/video.mp4",
              label="Pad naar videobestand"
          )
          model_size = mo.ui.dropdown(
              ["large-v2", "large-v3", "medium", "base"],
              value="large-v2",
              label="Whisper model"
          )
          language = mo.ui.text(
              placeholder="nl (leeglaten = automatisch)",
              label="Taal"
          )
          run_btn = mo.ui.run_button(label="▶ Start transcriptie")

          mo.vstack([video_path, model_size, language, run_btn])
          ---
          mo.stop(not run_btn.value, mo.md("Klik op **Start transcriptie** om te beginnen."))

          with mo.status.spinner(title="Bezig met transcriberen..."):
              lang = language.value.strip() if language.value.strip() else None

              # 1. Transcribeer
              mo.md("**Stap 1/4** — Model laden en transcriberen...").callout()
              model = whisperx.load_model(model_size.value, device, compute_type=compute_type)
              audio = whisperx.load_audio(video_path.value)
              result = model.transcribe(audio, batch_size=16, language=lang)
              detected_lang = result["language"]
              del model; gc.collect()

              # 2. Word-level alignment
              mo.md(f"**Stap 2/4** — Timestamps aligneren (taal: {detected_lang})...").callout()
              model_a, metadata = whisperx.load_align_model(language_code=detected_lang, device=device)
              result = whisperx.align(result["segments"], model_a, metadata, audio, device, return_char_alignments=False)
              del model_a; gc.collect()

              # 3. Diarization
              mo.md("**Stap 3/4** — Sprekers identificeren...").callout()
              diarize_model = whisperx.DiarizationPipeline(use_auth_token=HF_TOKEN, device=device)
              diarize_segments = diarize_model(audio)
              result = whisperx.assign_word_speakers(diarize_segments, result)
              del diarize_model; gc.collect()

              # 4. Opslaan
              mo.md("**Stap 4/4** — Resultaat opslaan...").callout()
              output_path = video_path.value.rsplit(".", 1)[0] + "_transcript.json"
              with open(output_path, "w", encoding="utf-8") as f:
                  json.dump(result, f, ensure_ascii=False, indent=2)
          ---
          mo.md(f"✅ **Klaar!** Opgeslagen als `{output_path}`")

          for seg in result["segments"][:10]:
              speaker = seg.get("speaker", "onbekend")
              mo.md(f"**{speaker}** [{seg['start']:.1f}s → {seg['end']:.1f}s]: {seg['text']}")

    # --- Marimo als systemd service ---
    - name: Maak systemd service aan voor Marimo
      copy:
        dest: /etc/systemd/system/marimo.service
        content: |
          [Unit]
          Description=Marimo Notebook Server
          After=network.target

          [Service]
          Type=simple
          User={{ install_user }}
          WorkingDirectory={{ workdir }}
          Environment="PATH=/home/{{ install_user }}/venv/bin"
          EnvironmentFile=/etc/environment
          ExecStart=/home/{{ install_user }}/venv/bin/marimo edit transcribe.py --host 0.0.0.0 --port 2718 --no-token
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Start en activeer Marimo service
      systemd:
        name: marimo
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Installatie voltooid
      debug:
        msg: >
          WhisperX en Marimo zijn geinstalleerd.
          Marimo is bereikbaar op poort 2718.
          Verbind via: ssh -L 2718:localhost:2718 ubuntu@<ip-adres>
          Of open poort 2718 in de SRC portal voor directe toegang.
